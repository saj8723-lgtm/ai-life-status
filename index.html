const COMBOS=[{n:"ダブル課金カタルシス",d:"2人同時ポチ→合計金額で現実直視",c:"#f9a825"},{n:"シンクロ二度寝",d:"誰も起こす人がいない最強の布団結界",c:"#fd79a8"},{n:"推し語りチェイン",d:"推しの話が止まらない無限ループ",c:"#e84393"},{n:"焚き火デュエット",d:"言葉なしで通じ合う沈黙の時間",c:"#00b894"},{n:"計画だけ完璧コンボ",d:"最高の計画を立てる。実行は明日",c:"#7c5ce7"},{n:"相互SNS監視",d:"既読速度が光の速さ",c:"#fd79a8"},{n:"ドライブ哲学対話",d:"車内で人生を語る。到着後に忘れる",c:"#0984e3"},{n:"深夜カフェイン共鳴",d:"2人で飲むコーヒーは1.5倍うまい",c:"#0984e3"}];
const SYN_R=["F","E","D","C","B","A","S","SS","SSS"],SYN_L=["水と油","微妙な距離感","まあまあ","悪くない","いいコンビ","最高の相棒","運命の出会い","伝説のペア","宇宙最強パーティ"];
const EQUIPS=[{e:"⚔️",n:"伝説のエナジードリンク",ef:"やる気+500 / 体力+300",d:"覚醒の秘薬",s:"mot",q:"エナジードリンク おすすめ"},{e:"🛡️",n:"不屈のノイキャンヘッドホン",ef:"知力+400 / 孤独耐性+350",d:"伝説級防具",s:"solo",q:"ノイズキャンセリング ヘッドホン"},{e:"📖",n:"禁断のAI魔導書",ef:"知力+600",d:"無限の知識を与える",s:"int",q:"AI 入門書 おすすめ"},{e:"🏕️",n:"聖なる焚き火台",ef:"やる気+450 / 孤独耐性+400",d:"全回復する神器",s:"mot",q:"焚き火台 コンパクト"},{e:"☕",n:"魔王のコーヒーメーカー",ef:"知力+350 / やる気+500",d:"8時間集中の呪い",s:"int",q:"コーヒーメーカー おすすめ"},{e:"💪",n:"覚醒のプロテイン",ef:"体力+600 / やる気+200",d:"筋肉が目覚める粉",s:"hp",q:"プロテイン おすすめ"},{e:"😴",n:"至高の快眠マットレス",ef:"体力+500 / 回復2倍",d:"究極寝具",s:"hp",q:"マットレス 快眠"},{e:"📚",n:"封印されし積ん読の山",ef:"知力+800（読めば）",d:"読破で伝説級",s:"int",q:"ベストセラー 本"}];
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function sr(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}
function gen(name,powMul=1){const h=hash(name+new Date().toDateString()),r=sr(h);const ji=Math.floor(r()*JOBS.length),ti=Math.floor(r()*TRAITS.length),mi=Math.floor(r()*MOVES.length),wi=Math.floor(r()*WKS.length),qi=Math.floor(r()*QTS.length);const sv={};let total=0;ST.forEach(s=>{let v=Math.floor(r()*800)+100;if(r()>.55)v=Math.floor(r()*400)+800;if(r()>.82)v=Math.floor(r()*30)+1;if(r()>.97)v=-1;if(r()>.993)v=Math.floor(r()*9000)+1000;v=Math.round(v*powMul);sv[s.k]=v;total+=(v>0?v:500);});const lv=Math.min(99,Math.max(1,Math.floor(total/80)));const ti2=total<1500?0:total<2000?1:total<2800?2:total<3600?3:total<4500?4:total<6000?5:6;const title=['見習い','一般','熟練','精鋭','達人','伝説','神話'][ti2];const sk=[...Array(SKS.length).keys()].sort(()=>r()-.5).slice(0,Math.floor(r()*2)+3).map(i=>SKS[i]);let low={k:'',v:99999};ST.forEach(s=>{if(sv[s.k]>0&&sv[s.k]<low.v)low={k:s.k,v:sv[s.k]};});return{name,job:JOBS[ji],jobD:JOBD[ji],jobC:JOBC[ji],trait:TRAITS[ti],trB:TBUF[ti],trD:TDEB[ti],lv,title,sv,total,sk,move:MOVES[mi],moveD:MOVED[mi],wk:WKS[wi],qt:QTS[qi],low};}
function drawRadar(id,vals,cols){const c=document.getElementById(id);if(!c)return;const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2,R=w/2-30,n=vals.length;ctx.clearRect(0,0,w,h);const labels=ST.map(s=>s.n.replace(/[^\u3000-\u9fff\w]/g,''));const MAX=1200;for(let ring=1;ring<=4;ring++){ctx.beginPath();for(let i=0;i<=n;i++){const a=Math.PI*2*i/n-Math.PI/2,rr=R*ring/4;ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));}ctx.closePath();ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--bd');ctx.lineWidth=1;ctx.stroke();}ctx.beginPath();vals.forEach((v,i)=>{const a=Math.PI*2*i/n-Math.PI/2;let vr;if(v<0){vr=R*1.18;}else if(v>MAX){vr=R*Math.min(v/MAX,1.15);}else{vr=(v/MAX)*R;}ctx.lineTo(cx+vr*Math.cos(a),cy+vr*Math.sin(a));});ctx.closePath();const dk=document.body.classList.contains('dark');ctx.fillStyle=dk?'rgba(78,205,196,.12)':'rgba(124,92,231,.1)';ctx.fill();ctx.strokeStyle=dk?'rgba(78,205,196,.6)':'rgba(124,92,231,.5)';ctx.lineWidth=2;ctx.stroke();vals.forEach((v,i)=>{const a=Math.PI*2*i/n-Math.PI/2;let vr;if(v<0){vr=R*1.18;}else if(v>MAX){vr=R*Math.min(v/MAX,1.15);}else{vr=(v/MAX)*R;}const isBreak=v<0||v>MAX;ctx.beginPath();ctx.arc(cx+vr*Math.cos(a),cy+vr*Math.sin(a),isBreak?5:3,0,Math.PI*2);ctx.fillStyle=cols[i];ctx.fill();if(isBreak){ctx.beginPath();ctx.arc(cx+vr*Math.cos(a),cy+vr*Math.sin(a),9,0,Math.PI*2);ctx.strokeStyle=cols[i]+'66';ctx.lineWidth=2;ctx.stroke();}const lr=R+20;ctx.font='bold 13px "Noto Sans JP"';ctx.textAlign='center';ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--dm');ctx.fillText(labels[i],cx+lr*Math.cos(a),cy+lr*Math.sin(a)+4);const vl=v<0?'???':v>999?v.toLocaleString()+'⚡':v.toString();ctx.font='bold 11px "DotGothic16"';ctx.fillStyle=cols[i];ctx.fillText(vl,cx+vr*Math.cos(a),cy+vr*Math.sin(a)-10);});}
function renderSolo(d){const vals=ST.map(s=>d.sv[s.k]),cols=ST.map(s=>s.c);document.getElementById('sc').innerHTML=`<div class="sc-head"><div class="sc-lv dot">Lv.${d.lv}</div><div class="sc-rank dot">${d.title}級冒険者</div></div><div class="sc-name">${d.name}</div><div class="sc-job" style="color:${d.jobC}">⚔️ ${d.job}</div><div class="sc-jd">${d.jobD}</div><div class="sc-traits"><span style="color:${d.jobC};background:color-mix(in srgb,${d.jobC} 10%,transparent);border-radius:3px">${d.trait}</span> <span style="color:var(--mint)">▲${d.trB}</span> <span style="color:var(--rose)">▼${d.trD}</span></div><canvas id="r1" class="sc-radar" width="340" height="340"></canvas><div class="sc-move"><div class="sc-move-l dot">⚡必殺技</div><div class="sc-move-n">${d.move}</div></div><div class="sc-wk"><b>弱点:</b> ${d.wk}</div><div class="sc-q">「${d.qt}」</div><div class="sc-foot dot">#AI人生ステータス ｜ ai-life-status.vercel.app</div>`;setTimeout(()=>drawRadar('r1',vals,cols),80);let bars='';ST.forEach(s=>{const v=d.sv[s.k],disp=v<0?'???':v.toLocaleString()+(v>999?' ⚡':''),w=v<0?100:Math.min(v/1500*100,100);bars+=`<div class="db"><div class="db-l"><span class="db-n">${s.n}</span><span class="db-v" style="color:${s.c}">${disp}</span></div><div class="db-t"><div class="db-f" style="width:0%;background:${s.c}" data-w="${w}"></div></div></div>`;});const skC=['#0984e3','#7c5ce7','#fd79a8','#f9a825','#e84393','#00b894'];let sks='';d.sk.forEach((s,i)=>{const c=skC[i%6];sks+=`<span class="d-sk" style="color:${c};background:color-mix(in srgb,${c} 8%,transparent);border-radius:4px">🔹${s}</span>`;});const sn=ST.find(s=>s.k===d.low.k)?.n||'???';const rel=EQUIPS.filter(e=>e.s===d.low.k||Math.random()>.55).slice(0,3);let eqs='';rel.forEach(e=>{const url='https://www.amazon.co.jp/s?k='+encodeURIComponent(e.q);eqs+=`<a class="eq" href="${url}" target="_blank" rel="noopener"><div class="eq-icon">${e.e}</div><div class="eq-info"><div class="eq-name">${e.n}</div><div class="eq-eff">${e.ef}</div><div class="eq-lore">${e.d}</div></div><div class="eq-badge">装備する→</div></a>`;});const celChips=CELEBS.map(c=>`<div class="cel-chip" onclick="showVS('${c.n}',${c.pow})">${c.n}</div>`).join('');document.getElementById('detailSection').innerHTML=`<div class="d-box"><h3 class="dot">📊 詳細ステータス</h3>${bars}</div><div class="d-box"><h3 class="dot">🔹 スキル</h3><div class="d-sks">${sks}</div></div><div class="d-box"><h3 class="dot">⚡ 必殺技「${d.move}」</h3><p style="font-size:.68em;color:var(--dm)">${d.moveD}</p></div><div class="d-box"><h3 class="dot">⚔️ 有名人と対戦してみる</h3><div class="cel-chips">${celChips}</div></div><div class="eq-section"><h3 class="dot">🧪 装備品ショップ</h3><div class="eq-sub">「${sn}」が低い…この装備で補強せよ</div>${eqs}</div>`;setTimeout(()=>{document.querySelectorAll('.db-f').forEach(el=>{el.style.width=el.dataset.w+'%';});},200);window._s=d;}
function showVS(cn,pow){const me=window._s,cel=gen(cn,pow);let bars='',mW=0,cW=0,keyBattle='';ST.forEach(s=>{const mv=me.sv[s.k]<0?500:me.sv[s.k],cv=cel.sv[s.k]<0?500:cel.sv[s.k];const mD=me.sv[s.k]<0?'???':me.sv[s.k].toLocaleString(),cD=cel.sv[s.k]<0?'???':cel.sv[s.k].toLocaleString();let w='';if(mv>cv){mW++;w='◀';}else if(cv>mv){cW++;w='▶';}const mx=Math.max(mv,cv,1);bars+=`<div class="vb"><div class="vb-l">${s.n}</div><div class="vb-r"><div class="vb-v dot" style="color:${mv>=cv?s.c:s.c+'55'}">${mD}</div><div class="vb-left"><div class="vb-fl" style="width:${mv/mx*100}%;background:${s.c}"></div></div><div class="vb-w">${w}</div><div class="vb-right"><div class="vb-fr" style="width:${cv/mx*100}%;background:${s.c}55"></div></div><div class="vb-v dot" style="color:${cv>=mv?s.c:s.c+'55'}">${cD}</div></div></div>`;if(!keyBattle&&mv!==cv)keyBattle=mv>cv?s.n+'で'+me.name+'が意地を見せた！':s.n+'で'+cn+'が格の違いを示した';});const wn=mW>cW?me.name:mW<cW?cn:'引き分け',wc=mW>cW?'var(--mint)':mW<cW?'var(--rose)':'var(--gold)';const narr=mW>cW?keyBattle+' 必殺技「'+me.move+'」が決まり、'+me.name+'の勝利！':mW<cW?keyBattle+' '+cn+'の壁は高かった…再戦を誓う'+me.name+'。':'互角の戦い。'+keyBattle+' 決着つかず。';document.getElementById('vsc').innerHTML='<div class="vsc-h dot">⚔️ BATTLE ⚔️</div><div class="vsc-vs"><div class="vsc-p"><div class="vsc-nm">'+me.name+'</div><div class="vsc-cls dot" style="color:'+me.jobC+'">Lv.'+me.lv+' '+me.job+'</div></div><div class="vsc-mid dot">VS</div><div class="vsc-p"><div class="vsc-nm">'+cn+'</div><div class="vsc-cls dot" style="color:'+cel.jobC+'">Lv.'+cel.lv+' '+cel.job+'</div></div></div>'+bars+'<div class="vsc-narr dot">'+narr+'</div><div class="vsc-res" style="color:'+wc+';background:color-mix(in srgb,'+wc+' 6%,transparent);border:1px solid color-mix(in srgb,'+wc+' 20%,transparent)">'+(wn==='引き分け'?'🤝引き分け':(wn===me.name?'🏆'+me.name+'の勝ち！':'😱'+cn+'の勝ち…'))+' '+mW+'-'+cW+'</div><div class="vsc-btns"><button class="vsc-cl dot" onclick="document.getElementById(\'vso\').classList.remove(\'on\')">閉じる</button><button class="vsc-sh dot" onclick="vsShare(\''+me.name+'\',\''+cn+'\','+mW+','+cW+',\''+me.job+'\',\''+cel.job+'\',\''+me.move+'\')">𝕏シェア</button></div>';document.getElementById('vso').classList.add('on');}
function vsShare(me,cel,mw,cw,mJ,cJ,mM){const r=mw>cw?'🏆勝利！':mw<cw?'😱敗北…':'🤝引き分け';window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('━━━━━━━━━━━━━\n⚔️ BATTLE RESULT\n━━━━━━━━━━━━━\n'+me+'（'+mJ+'）\n  VS\n'+cel+'（'+cJ+'）\n\nスコア: '+mw+'-'+cw+' '+r+'\n必殺技「'+mM+'」で挑んだ結果…\n\n→ あなたも挑戦してみる？\n'+SITE+'\n#AI人生ステータス'),'_blank');document.getElementById('vso').classList.remove('on');}
function nextSolo(){const n=document.getElementById('nxi').value.trim();if(!n)return;document.getElementById('nxi').value='';renderSolo(gen(n));window.scrollTo({top:0,behavior:'smooth'});}
function genCompat(n1,n2){const d1=gen(n1),d2=gen(n2),h=hash(n1+n2+new Date().toDateString()),r=sr(h);const combo=COMBOS[Math.floor(r()*COMBOS.length)];const ss=[{n:"🗺️冒険相性",v:Math.floor(r()*100)},{n:"💬会話の噛み合い",v:Math.floor(r()*100)},{n:"⚔️連携攻撃力",v:Math.floor(r()*100)},{n:"🛡️弱点補完",v:Math.floor(r()*100)},{n:"😊一緒にいて楽な度",v:Math.floor(r()*100)}];const avg=Math.floor(ss.reduce((a,s)=>a+s.v,0)/ss.length);const ri=Math.min(8,Math.floor(avg/12));return{d1,d2,combo,ss,avg,rank:SYN_R[ri],rl:SYN_L[ri]};}
function renderCompat(data){const{d1,d2,combo,ss,avg,rank,rl}=data;let sts='';ss.forEach(s=>{const c=s.v>70?'var(--mint)':s.v>40?'var(--gold)':'var(--rose)';sts+=`<div class="cc-st"><span class="cc-st-n">${s.n}</span><div class="cc-st-bar"><div class="cc-st-fill" style="width:${s.v}%;background:${c}"></div></div><span class="cc-st-v" style="color:${c}">${s.v}</span></div>`;});document.getElementById('cc').innerHTML=`<div class="cc-t dot">⚔️ パーティ編成</div><div class="cc-pair"><div class="cc-p"><div class="cc-nm">${d1.name}</div><div class="cc-j" style="color:${d1.jobC}">${d1.job}</div></div><div class="cc-mid">×</div><div class="cc-p"><div class="cc-nm">${d2.name}</div><div class="cc-j" style="color:${d2.jobC}">${d2.job}</div></div></div><div class="cc-syn"><div class="cc-syn-l dot">シナジー</div><div class="cc-syn-r">${rank}ランク「${rl}」</div></div><div class="cc-combo"><div class="cc-combo-l dot">💥合体必殺技</div><div class="cc-combo-n" style="color:${combo.c}">${combo.n}</div><div class="cc-combo-d">${combo.d}</div></div><div class="cc-stats">${sts}</div><div class="cc-advice">${avg>60?'この2人、パーティ組んだら最強かも。':avg>35?'悪くない。実戦で連携を磨こう。':'噛み合わないのも個性。レアなパーティ。'}</div><div class="cc-foot dot">#AI人生ステータス ｜ ai-life-status.vercel.app</div>`;window._c=data;}
function setMode(m,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');document.getElementById('soloIn').style.display=m==='solo'?'block':'none';document.getElementById('compatIn').style.display=m==='compat'?'block':'none';}

function goCompat(){const n1=document.getElementById('c1').value.trim(),n2=document.getElementById('c2').value.trim();if(!n1||!n2)return;showLd('パーティを編成中...',()=>{renderCompat(genCompat(n1,n2));document.getElementById('resCompat').classList.add('on');window.scrollTo({top:0,behavior:'smooth'});});}
function goCompatB(){const n1=document.getElementById('c1b').value.trim(),n2=document.getElementById('c2b').value.trim();if(!n1||!n2)return;document.getElementById('resSolo').classList.remove('on');showLd('パーティを編成中...',()=>{renderCompat(genCompat(n1,n2));document.getElementById('resCompat').classList.add('on');window.scrollTo({top:0,behavior:'smooth'});});}
function nextFromC(){const n=document.getElementById('nxi2').value.trim();if(!n)return;document.getElementById('nxi2').value='';document.getElementById('resCompat').classList.remove('on');renderSolo(gen(n));document.getElementById('resSolo').classList.add('on');window.scrollTo({top:0,behavior:'smooth'});}

function shX(){if(!window._s)return;const d=window._s;let mx={n:'',v:0};ST.forEach(s=>{const v=d.sv[s.k];if(v>mx.v)mx={n:s.n,v};});const mxD=mx.v<0?'???':mx.v.toLocaleString();window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('⚔️ギルド登録結果\n\n'+d.name+'\nジョブ:'+d.job+'（Lv.'+d.lv+'）\n必殺技「'+d.move+'」\n弱点「'+d.wk+'」\n最強ステ: '+mx.n+mxD+'\n\nギルドに登録する？↓\n'+SITE+'\n#AI人生ステータス'),'_blank');}

function shCX(){if(!window._c)return;const c=window._c;window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent('⚔️パーティ編成\n\n'+c.d1.name+' × '+c.d2.name+'\nシナジー: '+c.rank+'ランク「'+c.rl+'」\n合体技「'+c.combo.n+'」\n\nパーティを組む？↓\n'+SITE+'\n#AI人生ステータス'),'_blank');}

['ni','c2','nxi','nxi2','c2b'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter'){({ni:goSolo,c2:goCompat,nxi:nextSolo,nxi2:nextFromC,c2b:goCompatB})[id]();}});});
