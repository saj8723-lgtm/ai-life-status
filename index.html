  {e:"⚔️",n:"伝説のエナジードリンク",ef:"やる気+500 / 体力+300",d:"古の錬金術師が調合した覚醒の秘薬",s:"mot"},
  {e:"🛡️",n:"不屈のノイキャンヘッドホン",ef:"知力+400 / 孤独耐性+350",d:"全雑音を遮断する伝説級防具",s:"solo"},
  {e:"📖",n:"禁断のAI魔導書",ef:"知力+600",d:"読む者に無限の知識を与える…らしい",s:"int"},
  {e:"🏕️",n:"聖なる焚き火台",ef:"やる気+450 / 孤独耐性+400",d:"炎を見つめるだけで全回復する神器",s:"mot"},
  {e:"☕",n:"魔王のコーヒーメーカー",ef:"知力+350 / やる気+500",d:"1杯で8時間集中の呪いの道具",s:"int"},
  {e:"💪",n:"覚醒のプロテイン",ef:"体力+600 / やる気+200",d:"飲んだ瞬間に筋肉が目覚める粉",s:"hp"},
  {e:"😴",n:"至高の快眠マットレス",ef:"体力+500 / 全回復速度2倍",d:"眠りの神が祝福した究極寝具",s:"hp"},
  {e:"📚",n:"封印されし積ん読の山",ef:"知力+800（読めば）",d:"読破で伝説級。未読ならただの重り",s:"int"},
];

function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function sr(seed){let s=seed;return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};}

function gen(name){
  const h=hash(name+new Date().toDateString()),r=sr(h);
  const ji=Math.floor(r()*JOBS.length),ti=Math.floor(r()*TRAITS.length),mi=Math.floor(r()*MOVES.length),wi=Math.floor(r()*WKS.length),qi=Math.floor(r()*QTS.length);
  const lv=Math.floor(r()*60)+3;
  const sv={};let total=0;
  ST.forEach(s=>{let v=Math.floor(r()*800)+100;if(r()>.55)v=Math.floor(r()*400)+800;if(r()>.82)v=Math.floor(r()*30)+1;if(r()>.97)v=-1;if(r()>.993)v=Math.floor(r()*9000)+1000;sv[s.k]=v;total+=(v>0?v:500);});
  const sk=[...Array(SKS.length).keys()].sort(()=>r()-.5).slice(0,Math.floor(r()*2)+3).map(i=>SKS[i]);
  const title=['見習い','一般','熟練','精鋭','達人','伝説','神話'][Math.min(6,Math.floor(lv/10))];
  let low={k:'',v:99999};ST.forEach(s=>{if(sv[s.k]>0&&sv[s.k]<low.v)low={k:s.k,v:sv[s.k]};});
  return{name,job:JOBS[ji],jobD:JOBD[ji],jobC:JOBC[ji],trait:TRAITS[ti],trB:TBUF[ti],trD:TDEB[ti],lv,title,sv,total,sk,move:MOVES[mi],moveD:MOVED[mi],wk:WKS[wi],qt:QTS[qi],low};
}

function drawRadar(id,vals,cols){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height,cx=w/2,cy=h/2,R=w/2-28,n=vals.length;
  ctx.clearRect(0,0,w,h);
  const labels=ST.map(s=>s.n.replace(/[^\u3000-\u9fff\w]/g,''));
  for(let ring=1;ring<=4;ring++){ctx.beginPath();for(let i=0;i<=n;i++){const a=Math.PI*2*i/n-Math.PI/2,rr=R*ring/4;ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));}ctx.closePath();ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--bd');ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  vals.forEach((v,i)=>{const a=Math.PI*2*i/n-Math.PI/2,vr=Math.min(v<0?.7:v/1500,1)*R;ctx.lineTo(cx+vr*Math.cos(a),cy+vr*Math.sin(a));});
  ctx.closePath();
  const isDark=document.body.classList.contains('dark');
  ctx.fillStyle=isDark?'rgba(78,205,196,.12)':'rgba(124,92,231,.1)';ctx.fill();
  ctx.strokeStyle=isDark?'rgba(78,205,196,.6)':'rgba(124,92,231,.5)';ctx.lineWidth=2;ctx.stroke();
  vals.forEach((v,i)=>{
    const a=Math.PI*2*i/n-Math.PI/2,vr=Math.min(v<0?.7:v/1500,1)*R;
    ctx.beginPath();ctx.arc(cx+vr*Math.cos(a),cy+vr*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle=cols[i];ctx.fill();
    const lr=R+18;ctx.font='bold 14px "Noto Sans JP"';ctx.textAlign='center';ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--dm');
    ctx.fillText(labels[i],cx+lr*Math.cos(a),cy+lr*Math.sin(a)+4);
    const vl=v<0?'???':v>999?v.toLocaleString()+'⚡':v.toString();
    ctx.font='bold 11px "DotGothic16"';ctx.fillStyle=cols[i];
    ctx.fillText(vl,cx+vr*Math.cos(a),cy+vr*Math.sin(a)-8);
  });
}

function renderSolo(d){
  const vals=ST.map(s=>d.sv[s.k]),cols=ST.map(s=>s.c);
  // Share card (compact)
  document.getElementById('sc').innerHTML=`
    <div class="sc-head"><div class="sc-lv dot">Lv.${d.lv} ${d.job}</div><div class="sc-rank dot">${d.title}級</div></div>
    <div class="sc-name">${d.name}</div>
    <div class="sc-job" style="color:${d.jobC}">⚔️ ${d.job}</div>
    <div class="sc-jd">${d.jobD}</div>
    <div class="sc-traits"><span style="color:${d.jobC};background:color-mix(in srgb,${d.jobC} 10%,transparent);border-radius:3px">${d.trait}</span> <span style="color:var(--mint)">▲${d.trB}</span> <span style="color:var(--rose)">▼${d.trD}</span></div>
    <canvas id="r1" class="sc-radar" width="340" height="340"></canvas>
    <div class="sc-move"><div class="sc-move-l dot">⚡必殺技</div><div class="sc-move-n">${d.move}</div></div>
    <div class="sc-wk"><b>弱点:</b> ${d.wk}</div>
    <div class="sc-q">「${d.qt}」</div>
    <div class="sc-foot dot">#AI人生ステータス ｜ ai-life-status.app</div>`;
  setTimeout(()=>drawRadar('r1',vals,cols),80);

  // Detail section
  let bars='';ST.forEach(s=>{const v=d.sv[s.k],disp=v<0?'???':v.toLocaleString()+(v>999?' ⚡':''),w=v<0?100:Math.min(v/1500*100,100);
    bars+=`<div class="db"><div class="db-l"><span class="db-n">${s.n}</span><span class="db-v" style="color:${s.c}">${disp}</span></div><div class="db-t"><div class="db-f" style="width:0%;background:${s.c}" data-w="${w}"></div></div></div>`;});
  const skC=['#0984e3','#7c5ce7','#fd79a8','#f9a825','#e84393','#00b894'];
  let sks='';d.sk.forEach((s,i)=>{const c=skC[i%6];sks+=`<span class="d-sk" style="color:${c};background:color-mix(in srgb,${c} 8%,transparent);border-radius:4px">🔹${s}</span>`;});
  const sn=ST.find(s=>s.k===d.low.k)?.n||'???';
  const rel=EQUIPS.filter(e=>e.s===d.low.k||Math.random()>.55).slice(0,3);
  let eqs='';rel.forEach(e=>{eqs+=`<div class="eq"><div class="eq-icon">${e.e}</div><div class="eq-info"><div class="eq-name">${e.n}</div><div class="eq-eff">${e.ef}</div><div class="eq-lore">${e.d}</div></div><a href="#" class="eq-link">装備する →</a></div>`;});
  const gq=[{q:"この査定結果、どう思う？",o:["まさにその通り","心当たりありすぎ","…ノーコメント"]},{q:"次の行動は？",o:["仲間を集める","有名人に挑む","まず布団から出る"]},{q:"冒険の目的は？",o:["副業で月10万","仲間との旅","布団から出ること"]}];
  const gqi=gq[Math.floor(Math.random()*gq.length)];

  document.getElementById('detailSection').innerHTML=`
    <div class="d-box"><h3 class="dot">📊 詳細ステータス</h3>${bars}</div>
    <div class="d-box"><h3 class="dot">🔹 スキル</h3><div class="d-sks">${sks}</div></div>
    <div class="d-box"><h3 class="dot">⚡ 必殺技「${d.move}」</h3><p style="font-size:.68em;color:var(--dm)">${d.moveD}</p></div>
    <div class="eq-section"><h3 class="dot">🧪 装備品ショップ</h3><div class="eq-sub">「${sn}」が低い…この装備で補強せよ</div>${eqs}</div>
    <div class="d-box"><h3 class="dot">💬 ギルドマスターからの問い</h3><p style="font-size:.68em;color:var(--dm);margin-bottom:4px">${gqi.q}</p><div class="choices">${gqi.o.map(o=>`<button class="ch dot" onclick="this.classList.toggle('picked')">▶ ${o}</button>`).join('')}</div></div>`;
  setTimeout(()=>{document.querySelectorAll('.db-f').forEach(el=>{el.style.width=el.dataset.w+'%';});},200);
  window._s=d;
}

function nextSolo(){const n=document.getElementById('nxi').value.trim();if(!n)return;document.getElementById('nxi').value='';renderSolo(gen(n));window.scrollTo({top:0,behavior:'smooth'});}

function genCompat(n1,n2){
  const d1=gen(n1),d2=gen(n2),h=hash(n1+n2+new Date().toDateString()),r=sr(h);
  const combo=COMBOS[Math.floor(r()*COMBOS.length)];
  const ss=[{n:"🗺️冒険相性",v:Math.floor(r()*100)},{n:"💬会話の噛み合い",v:Math.floor(r()*100)},{n:"⚔️連携攻撃力",v:Math.floor(r()*100)},{n:"🛡️弱点補完",v:Math.floor(r()*100)},{n:"😊一緒にいて楽な度",v:Math.floor(r()*100)}];
  const avg=Math.floor(ss.reduce((a,s)=>a+s.v,0)/ss.length);
  const ri=Math.min(8,Math.floor(avg/12));
  return{d1,d2,combo,ss,avg,rank:SYN_R[ri],rl:SYN_L[ri]};
}

function renderCompat(data){
  const{d1,d2,combo,ss,avg,rank,rl}=data;
  let sts='';ss.forEach(s=>{const c=s.v>70?'var(--mint)':s.v>40?'var(--gold)':'var(--rose)';sts+=`<div class="cc-st"><span class="cc-st-n">${s.n}</span><div class="cc-st-bar"><div class="cc-st-fill" style="width:${s.v}%;background:${c}"></div></div><span class="cc-st-v" style="color:${c}">${s.v}</span></div>`;});
  document.getElementById('cc').innerHTML=`
    <div class="cc-t dot">⚔️ パーティ相性査定</div>
    <div class="cc-pair"><div class="cc-p"><div class="cc-nm">${d1.name}</div><div class="cc-j" style="color:${d1.jobC}">${d1.job}</div></div><div class="cc-mid">×</div><div class="cc-p"><div class="cc-nm">${d2.name}</div><div class="cc-j" style="color:${d2.jobC}">${d2.job}</div></div></div>
    <div class="cc-syn"><div class="cc-syn-l dot">シナジー</div><div class="cc-syn-r">${rank}ランク「${rl}」</div></div>
    <div class="cc-combo"><div class="cc-combo-l dot">💥合体必殺技</div><div class="cc-combo-n" style="color:${combo.c}">${combo.n}</div><div class="cc-combo-d">${combo.d}</div></div>
    <div class="cc-stats">${sts}</div>
    <div class="cc-advice">${avg>60?'この2人、パーティ組んだら最強かも。':avg>35?'悪くない。実戦で連携を磨こう。':'噛み合わないのも個性。レアなパーティ。'}</div>
    <div class="cc-foot dot">#AI人生ステータス ｜ ai-life-status.app</div>`;
  window._c=data;
}
